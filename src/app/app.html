<header class="main-header">
  <div class="logo">
    <a routerLink="/" class="monogram">
    <span class="first-initial">A</span><span class="last-initial">H</span>
  </a>
  </div>
  <nav class="main-nav">
    <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/resume" routerLinkActive="active-link">Resume</a>
    <a routerLink="/projects" routerLinkActive="active-link">Projects</a>
    <a routerLink="/contact" routerLinkActive="active-link">Contact</a>
  </nav>
  <button class="theme-toggle" (click)="themeService.toggleTheme()">
  {{ themeService.isDark() ? '☀️ Light' : '🌙 Dark' }}
</button>
</header>

<main class="content-container">
  <router-outlet></router-outlet>
</main>

<footer class="main-footer">
  <p>© 2026 Adam Hilty. All rights reserved.</p>
  
  <ng-container *ngIf="status$ | async as status; else loading">
    <a routerLink="/status" class="status-link">
      System Status {{ status.apiStatus === 'Operational' ? '🟢' : '🔴' }}
    </a>
  </ng-container>

  <ng-template #loading>
    <a routerLink="/status" class="status-link">System Status ⚪</a>
  </ng-template>
</footer>
