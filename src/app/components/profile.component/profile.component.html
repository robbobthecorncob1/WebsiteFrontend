@if (profile$ | async; as profile) {
  <section class="profile-container">
    <div class="profile-content">
      
      <h1>Hi, I'm <span class="highlight">{{ profile.firstName }}</span> {{ profile.lastName }}</h1>
      <h2 class="headline">{{ profile.headline }}</h2>
      <p class="bio">{{ profile.bio }}</p>

      <div class="social-links">
        @for (link of profile.socialLinks; track link.id) {
          <a [href]="link.url" target="_blank" class="social-btn">
            {{ link.platform }}
          </a>
        }
      </div>

    </div>
  </section>
} @else {
  <div class="loading-state">
    <p>Loading profile...</p>
  </div>
}
